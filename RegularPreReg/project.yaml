  - { id: 2,  question: "@AdmissionDate - is 2026-09-01 the correct FDOS date?",                  status: "open" }
  - { id: 3,  question: "@AdmissionCode and @AdmissionReason - what values for pre-reg?",          status: "open" }
  - { id: 4,  question: "@OfficialClass - source or default?",                                     status: "open" }
  - { id: 5,  question: "@RefPersonalInformationVerificationCode - 'B' per Call script, confirm?", status: "open" }
  - { id: 6,  question: "@Ethnicity - no source data; default value?",                             status: "open" }
  - { id: 7,  question: "SchoolYearId - what value for the staging table?",                        status: "open" }
  - { id: 8,  question: "Duplicate handling - what behavior on duplicate?",                        status: "open" }
  - { id: 9,  question: "API Integration - endpoints, auth, and payload specs?",                   status: "open" }
  - { id: 10, question: "Are there returning students in source files, or all new?",               status: "open" }
